server:
  port: 8080

spring:
  datasource:
    url: "jdbc:mysql://${DB_HOST:${MYSQL_HOST:localhost}}:${DB_PORT:${MYSQL_PORT:3306}}/${DB_NAME:${MYSQL_DATABASE:meeting_system}}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true"
    username: "${DB_USERNAME:${MYSQL_USER:root}}"
    password: "${DB_PASSWORD:${MYSQL_PASSWORD:meeting_password}}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  ai:
    model:
      chat: ollama
    ollama:
      base-url: "http://127.0.0.1:11434"
      init:
        pull-model-strategy: never
      chat:
        options:
          model: "qwen2.5:7b"

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

assistant:
  ai:
    enabled: true
    timeout-ms: 10000
